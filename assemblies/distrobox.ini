[my-distrobox]
additional_packages=fish
additional_packages=flac
additional_packages=lazygit
additional_packages=libjxl
additional_packages=msedit
additional_packages=perl-image-exiftool
additional_packages=rclone
additional_packages=rustup
additional_packages=wavpack
entry=false
image=archlinux:latest
init_hooks=sudo ln --symbolic /usr/bin/distrobox-host-exec /usr/local/bin/distrobox
init_hooks=sudo ln --symbolic /usr/bin/distrobox-host-exec /usr/local/bin/docker
pre_init_hooks="export SHELL=/bin/fish"
replace=true
